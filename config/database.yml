default: &default
  adapter: oracle_enhanced

# Local: docker-compose oracle service (oracle:1521)
# OCI ADB: oracle-enhanced://ADMIN:pass@hostname:1521/dbname_high
development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "oracle-enhanced://system:oracle_poc_secret@localhost:1521/FREEPDB1") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "oracle-enhanced://system:oracle_poc_secret@localhost:1521/FREEPDB1") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>
