name: Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Fires automatically after CI completes on a dependabot or automated branch
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_branch, 'dependabot/') ||
       startsWith(github.event.workflow_run.head_branch, 'automated/'))
    steps:
      - name: Find PR
        id: pr
        run: |
          number=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --json number \
            --jq '.[0].number // empty')
          echo "number=$number" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve
        if: steps.pr.outputs.number
        # Approval may fail if the PR was opened by the same token (automated PRs).
        # That's fine — no branch protection rules require it.
        run: gh pr review ${{ steps.pr.outputs.number }} --approve || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge
        if: steps.pr.outputs.number
        run: gh pr merge ${{ steps.pr.outputs.number }} --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Triggered manually to catch PRs that already have green CI
  auto-merge-existing:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Merge all passing automated and Dependabot PRs
        run: |
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --json number,headRefName,statusCheckRollup \
            --jq '.[] | select(
              (.headRefName | startswith("dependabot/") or startswith("automated/")) and
              (.statusCheckRollup | length > 0) and
              (.statusCheckRollup | all(.conclusion == "SUCCESS"))
            ) | .number' | \
          while read -r number; do
            echo "Processing PR #$number"
            gh pr review "$number" --approve || true
            gh pr merge "$number" --squash || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
