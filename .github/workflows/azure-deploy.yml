name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy-azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    concurrency: deploy-azure
    steps:
      - uses: actions/checkout@v7

      - name: Restore Oracle wallet
        run: |
          mkdir -p config/oracle/wallet
          echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 -d > /tmp/wallet.zip
          unzip -q /tmp/wallet.zip -d config/oracle/wallet
          rm /tmp/wallet.zip

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image ${{ vars.APP_NAME }}:${{ github.sha }} \
            --image ${{ vars.APP_NAME }}:latest \
            .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.APP_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          echo "Waiting for Azure to become healthy..."
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 https://${{ vars.APP_HOSTNAME }} || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Azure deployment is healthy"
              exit 0
            fi
            sleep 15
          done
          echo "Azure failed to return 200 after 10 attempts"
          exit 1
