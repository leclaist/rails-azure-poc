name: Deploy to Azure

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    concurrency: deploy-azure
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Oracle wallet
        run: |
          mkdir -p config/oracle/wallet
          echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 -d > /tmp/wallet.zip
          unzip -q /tmp/wallet.zip -d config/oracle/wallet
          rm /tmp/wallet.zip

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image ${{ vars.APP_NAME }}:${{ github.sha }} \
            --image ${{ vars.APP_NAME }}:latest \
            .

      - name: Deploy to Container Apps
        id: deploy
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SERVICE: ${{ secrets.DB_SERVICE }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          REVISION=$(az containerapp update \
            --name ${{ vars.APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.APP_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "DB_USERNAME=${DB_USERNAME}" \
              "DB_PASSWORD=${DB_PASSWORD}" \
              "DB_SERVICE=${DB_SERVICE}" \
              "RAILS_MASTER_KEY=${RAILS_MASTER_KEY}" \
            --remove-env-vars DATABASE_URL \
            --query "properties.latestRevisionName" \
            --output tsv)
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "Deployed revision: $REVISION"

      - name: Smoke test
        env:
          APP: ${{ vars.APP_NAME }}
          RG: ${{ vars.RESOURCE_GROUP }}
          HOST: ${{ vars.APP_HOSTNAME }}
          REVISION: ${{ steps.deploy.outputs.revision }}
        run: |
          echo "=== Waiting for revision $REVISION to reach Running state ==="
          for i in $(seq 1 20); do
            state=$(az containerapp revision show \
              --name "$APP" --resource-group "$RG" --revision "$REVISION" \
              --query "properties.runningState" --output tsv 2>/dev/null || echo "unknown")
            echo "Attempt $i: revision state = $state"
            case "$state" in
              Running) echo "Revision is Running"; break ;;
              Stopped|Failed|Degraded)
                echo "=== Revision entered failed state: $state ==="
                az containerapp logs show --name "$APP" --resource-group "$RG" \
                  --revision "$REVISION" --tail 100 2>&1 \
                  | grep -iE "(Error|FATAL|Exception|ORA-)" \
                  | sed -e 's|://[^:]*:[^@]*@|://[REDACTED]:[REDACTED]@|g' \
                  -e 's|[A-Za-z][A-Za-z0-9_.+-]*:[^@ ]*@|[REDACTED]:[REDACTED]@|g' || true
                exit 1
                ;;
            esac
            if [ "$i" = "20" ]; then
              echo "Timed out waiting for revision to become Running"
              az containerapp logs show --name "$APP" --resource-group "$RG" \
                --revision "$REVISION" --tail 100 2>&1 \
                | grep -iE "(Error|FATAL|Exception|ORA-)" \
                | sed -e 's|://[^:]*:[^@]*@|://[REDACTED]:[REDACTED]@|g' \
                  -e 's|[A-Za-z][A-Za-z0-9_.+-]*:[^@ ]*@|[REDACTED]:[REDACTED]@|g' || true
              exit 1
            fi
            sleep 15
          done

          echo "=== Scanning container logs for revision $REVISION ==="
          LOGS=$(az containerapp logs show --name "$APP" --resource-group "$RG" \
            --revision "$REVISION" --tail 150 2>&1 || true)
          ERROR_LINES=$(echo "$LOGS" | grep -iE "(LoadError|RuntimeError|URI::Invalid|ORA-[0-9]+|Errno::|FATAL|Error initializing|check_load_error)" || true)
          if [ -n "$ERROR_LINES" ]; then
            echo "ERROR: Found error patterns in container logs:"
            # Redact credentials — covers both url://user:pass@host and bare user:pass@ formats
            echo "$ERROR_LINES" | sed -e 's|://[^:]*:[^@]*@|://[REDACTED]:[REDACTED]@|g' \
                  -e 's|[A-Za-z][A-Za-z0-9_.+-]*:[^@ ]*@|[REDACTED]:[REDACTED]@|g'
            exit 1
          fi
          echo "No error patterns found in container logs"

          echo "=== HTTP smoke test ==="
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "https://$HOST" || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Deployment is healthy"
              exit 0
            fi
            sleep 15
          done
          echo "Failed to return HTTP 200 after 10 attempts"
          exit 1
