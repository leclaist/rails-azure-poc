services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: oracle_poc_secret
      APP_USER: rails_app
      APP_USER_PASSWORD: rails_app_secret
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: oracle-enhanced://rails_app:rails_app_secret@oracle:1521/FREEPDB1
    depends_on:
      oracle:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bin/rails db:prepare && bin/rails test"
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: test
      DATABASE_URL: oracle-enhanced://rails_app:rails_app_secret@oracle:1521/FREEPDB1
    depends_on:
      oracle:
        condition: service_healthy
    profiles:
      - test

volumes:
  oracle_data:
